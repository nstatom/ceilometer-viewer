<script>

async function run(){

let icao=document.getElementById("icao").value.toUpperCase();
let hours=document.getElementById("hours").value;

const api =
`https://aviationweather.gov/api/data/metar?ids=${icao}&format=json&hours=${hours}`;

/* CORS proxy for debugging */
const url =
`https://api.allorigins.win/raw?url=${encodeURIComponent(api)}`;

document.getElementById("status").innerHTML =
"Request:<br>"+url;

try{

const r=await fetch(url);

document.getElementById("status").innerHTML +=
"<br>Status: "+r.status;

const data=await r.json();

document.getElementById("raw").textContent =
JSON.stringify(data,null,2);

plot(data);

}catch(err){

document.getElementById("status").innerHTML =
"<span class='error'>Download failed</span>";

console.error(err);

}

}

// ------------------------
// PLOT FUNCTION (FIXED)
// ------------------------

function plot(data){

let x=[];
let y=[];
let colors=[];

data.forEach(m => {

const time = m.reportTime
  ? new Date(m.reportTime)
  : new Date(m.obsTime * 1000);

// CLEAR
if(!m.clouds || m.clouds.length === 0){

x.push(time);
y.push(100);   // slightly above zero
colors.push("yellow");
return;

}

// CLOUDS
m.clouds.forEach(layer => {

x.push(time);
y.push(layer.base);

if(layer.cover === "FEW") colors.push("green");
else if(layer.cover === "SCT") colors.push("blue");
else if(layer.cover === "BKN") colors.push("red");
else if(layer.cover === "OVC") colors.push("black");
else colors.push("gray");

});

});

// Plotly
Plotly.newPlot("plot",[{
x:x,
y:y,
mode:"markers",
name:"Cloud Layers",
marker:{
size:12,
color:colors,
line:{width:1,color:"black"}
}
}],{
xaxis:{title:"Time"},
yaxis:{title:"Cloud Base (ft AGL)"}
});

}

// auto-run
run();

</script>
